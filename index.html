<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応援（副業）記録</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>💰</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #dde3e8; --bg3: #c8d6e0; --today-bg: #dbeafe;
  --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0;
  --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
  --success-bg: #eaf3de; --success-text: #27500a; --danger-text: #a32d2d;
  --radius-md: 8px; --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1c; --bg2: #2a2e35; --bg3: #1a2030; --today-bg: #1a2340;
    --text: #f0f0f0; --text2: #a0a0a0; --text3: #666;
    --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    --success-bg: #173404; --success-text: #97c459; --danger-text: #f09595;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e0; color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 680px; margin: 0 auto; }
.top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.top-nav h1 { font-size: 20px; font-weight: 500; }
.nav-btns { display: flex; align-items: center; gap: 8px; }
.nav-btn { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-md); padding: 6px 12px; cursor: pointer; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 4px; }
.nav-btn:hover { background: var(--bg2); }
.month-label { font-size: 15px; font-weight: 500; min-width: 96px; text-align: center; }
.sync-status { font-size: 11px; padding: 4px 10px; border-radius: 99px; background: var(--bg2); color: var(--text3); }
.sync-status.syncing { color: #2980b9; }
.sync-status.ok { color: #27500a; }
.sync-status.err { color: var(--danger-text); }
.ot-input-row { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 1.25rem; }
.ot-input-row label { font-size: 13px; color: var(--text2); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.ot-input-row input { width: 80px; font-size: 16px; font-weight: 500; color: var(--text); background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 10px; }
.ot-input-row span { font-size: 13px; color: var(--text2); }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat-card { background: var(--bg2); border-radius: var(--radius-md); padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 500; color: var(--text); text-align: center; }
.stat-unit { font-size: 12px; color: var(--text3); font-weight: 400; }
.stat-val.plus { color: var(--danger-text); }
.stat-val.minus { color: var(--success-text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 1.25rem; }
.cal-header { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; font-weight: 500; }
.cal-day { min-height: 54px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: var(--bg); padding: 4px 4px; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.cal-day:hover { border-color: var(--border2); background: var(--bg2); }
.cal-day.empty { border-color: transparent; cursor: default; background: transparent !important; }
.cal-day.today { background: var(--today-bg); border-color: var(--border); }
.cal-day.weekend { background: var(--bg2); }
.cal-day.has-en { background: var(--success-bg); }
.cal-day.today.has-en { background: var(--success-bg); border: 1px solid #639922; }
.cal-day.selected { border: 1.5px solid var(--text3); background: var(--bg2); }
.day-num { font-size: 11px; color: var(--text2); align-self: flex-start; }
.day-en { font-size: 16px; font-weight: 500; color: #3b6d11; margin: auto 0; }
@media (prefers-color-scheme: dark) { .day-en { color: #97c459; } }
.entry-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
.entry-title { font-size: 14px; font-weight: 500; }
.entry-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.entry-row label { font-size: 13px; color: var(--text2); width: 80px; flex-shrink: 0; }
.entry-row input { width: 90px; font-size: 14px; color: var(--text); background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 10px; }
.entry-row textarea { flex: 1; font-size: 14px; color: var(--text); background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 6px 10px; height: 52px; resize: none; font-family: inherit; }
.entry-actions { display: flex; gap: 8px; }
.btn-save { padding: 7px 18px; border-radius: var(--radius-md); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-size: 13px; }
.btn-save:hover { opacity: 0.85; }
.btn-del { padding: 7px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: transparent; color: var(--danger-text); cursor: pointer; font-size: 13px; }
.btn-del:hover { background: var(--bg2); }
.section-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }
.log-head { display: grid; grid-template-columns: 40px 70px 1fr; gap: 8px; padding: 4px 0; font-size: 11px; color: var(--text3); border-bottom: 0.5px solid var(--border); margin-bottom: 2px; }
.log-item { display: grid; grid-template-columns: 40px 70px 1fr; align-items: baseline; gap: 8px; padding: 9px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; cursor: pointer; }
.log-item:last-child { border-bottom: none; }
.log-item:hover { opacity: 0.7; }
.log-date { color: var(--text2); }
.log-en { color: #3b6d11; font-weight: 500; }
@media (prefers-color-scheme: dark) { .log-en { color: #97c459; } }
.log-note { color: var(--text3); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-chart { margin-top: 4px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.bar-label { font-size: 11px; color: var(--text3); min-width: 64px; }
.bar-track { flex: 1; height: 14px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
.bar-en { height: 100%; background: #97c459; border-radius: 99px; transition: width 0.4s; }
.bar-val { font-size: 12px; font-weight: 500; min-width: 48px; text-align: right; }
.card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.25rem; margin-bottom: 1.25rem; }
</style>
</head>
<body>
<div class="container">
  <div class="top-nav">
    <h1>応援（副業）記録 📈</h1>
    <div class="nav-btns">
      <span class="sync-status" id="sync-status">読み込み中...</span>
      <button class="nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="month-label" id="month-label"></span>
      <button class="nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="ot-input-row">
    <label for="ot-month-input"><i class="ti ti-clock" style="font-size:16px;"></i>今月のフレックス日次過不足</label>
    <input type="number" id="ot-month-input" step="0.5" placeholder="0" oninput="onOtInput()" />
    <span>時間</span>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">フレックス日次過不足（入力値）</div>
      <div class="stat-val" id="stat-ot">0<span class="stat-unit">h</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">応援合計（日次集計）</div>
      <div class="stat-val" id="stat-en">0<span class="stat-unit">h</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">差（フレックス−応援）</div>
      <div class="stat-val" id="stat-diff">0<span class="stat-unit">h</span></div>
    </div>
  </div>

  <div class="cal-grid" id="cal-grid"></div>

  <div class="entry-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="entry-title" id="entry-title">日付を選択して応援時間を記録</div>
      <button id="btn-calc" onclick="calcFromNow()" style="display:none;padding:6px 12px;border-radius:var(--radius-md);border:0.5px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;align-items:center;gap:5px;">
        <i class="ti ti-logout" style="font-size:14px;"></i>17:10から計算
      </button>
    </div>
    <div class="entry-row">
      <label for="en-hours">応援時間</label>
      <input type="number" id="en-hours" min="0" max="24" step="0.5" placeholder="0" />
      <span style="font-size:13px;color:var(--text2);">時間</span>
    </div>
    <div class="entry-row">
      <label for="en-note">メモ</label>
      <textarea id="en-note" placeholder="内容など（任意）"></textarea>
    </div>
    <div class="entry-actions">
      <button class="btn-save" onclick="saveEntry()">保存</button>
      <button class="btn-del" onclick="deleteEntry()" id="btn-del" style="display:none;">削除</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">今月の応援記録</div>
    <div id="log-list"></div>
  </div>

  <div class="card">
    <div class="section-title">月別サマリー（直近6ヶ月）</div>
    <div class="bar-chart" id="bar-chart"></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzzXoM6qpRPk_VkKK5nXCxROQydBxE-jQvYtLSX8DJrpurPxeBjMxFoyVvP_BO9FcHs/exec';

let records = {};
let monthOt = {};
const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth();
let selectedDate = null;
const DAYS = ['日','月','火','水','木','金','土'];

function mkey(y,m){ return `${y}-${String(m+1).padStart(2,'0')}`; }
function dkey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function r(v){ return Math.round(v*100)/100; }
function fmtDiff(d){ return (d>0?'+':'')+d; }
function diffClass(d){ return d!==0?'plus':''; }

function setStatus(msg, cls){
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = 'sync-status' + (cls?' '+cls:'');
}

async function loadFromGAS(){
  setStatus('読み込み中...', 'syncing');
  try {
    const res = await fetch(GAS_URL);
    const text = await res.text();
    const data = JSON.parse(text);
    records = data.records || {};
    monthOt = data.monthOt || {};
    setStatus('同期済み ✓', 'ok');
  } catch(e){
    setStatus('オフライン', 'err');
    try {
      const r2 = localStorage.getItem('ot_records');
      const m2 = localStorage.getItem('ot_monthOt');
      if(r2) records = JSON.parse(r2);
      if(m2) monthOt = JSON.parse(m2);
    } catch(_){}
  }
  renderAll();
}

async function saveToGAS(){
  setStatus('保存中...', 'syncing');
  try {
    localStorage.setItem('ot_records', JSON.stringify(records));
    localStorage.setItem('ot_monthOt', JSON.stringify(monthOt));
  } catch(_){}
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ records, monthOt }),
    });
    setStatus('同期済み ✓', 'ok');
  } catch(e){
    setStatus('保存失敗（オフライン）', 'err');
  }
}

function changeMonth(delta){
  viewMonth+=delta;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  selectedDate=null;
  renderAll();
}

function onOtInput(){
  const val=parseFloat(document.getElementById('ot-month-input').value);
  monthOt[mkey(viewYear,viewMonth)]= isNaN(val) ? 0 : r(val);
  saveToGAS();
  renderStats();renderBar();
}

function calcEnTotal(y,m){
  const last=new Date(y,m+1,0).getDate();
  let en=0;
  for(let d=1;d<=last;d++){const rec=records[dkey(y,m,d)];if(rec)en+=rec.en||0;}
  return r(en);
}

function renderAll(){
  document.getElementById('month-label').textContent=`${viewYear}年${viewMonth+1}月`;
  const stored = monthOt[mkey(viewYear,viewMonth)];
  document.getElementById('ot-month-input').value = (stored !== undefined && stored !== 0) ? stored : '';
  renderCal();renderEntry();renderLog();renderStats();renderBar();
}

function renderCal(){
  const grid=document.getElementById('cal-grid');
  let html=DAYS.map((d,i)=>`<div class="cal-header" style="${i===0?'color:#c0392b;':i===6?'color:#2980b9;':''}">${d}</div>`).join('');
  const first=new Date(viewYear,viewMonth,1).getDay();
  const last=new Date(viewYear,viewMonth+1,0).getDate();
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=last;d++){
    const k=dkey(viewYear,viewMonth,d);
    const rec=records[k];
    const dow=new Date(viewYear,viewMonth,d).getDay();
    const isToday=d===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear();
    const isPast=new Date(viewYear,viewMonth,d)<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    const isWeekday=dow!==0&&dow!==6;
    const isSel=selectedDate===k;
    let cls='cal-day';
    if(dow===0||dow===6)cls+=' weekend';
    if(isToday)cls+=' today';
    if(rec&&rec.en>0)cls+=' has-en';
    if(isSel)cls+=' selected';
    const showNone=isPast&&isWeekday&&(!rec||!rec.en);
    html+=`<div class="${cls}" onclick="selectDay('${k}')">
      <span class="day-num">${d}</span>
      ${rec&&rec.en>0?`<span class="day-en">${rec.en}</span>`:showNone?`<span style="font-size:10px;color:var(--text3);margin:auto 0;">応援なし</span>`:''}
    </div>`;
  }
  grid.innerHTML=html;
}

function selectDay(k){selectedDate=k;renderCal();renderEntry();}

function renderEntry(){
  if(!selectedDate)return;
  const parts=selectedDate.split('-');
  document.getElementById('entry-title').textContent=`${parseInt(parts[1])}月${parseInt(parts[2])}日 — 応援時間`;
  const rec=records[selectedDate]||{};
  document.getElementById('en-hours').value=rec.en||'';
  document.getElementById('en-note').value=rec.note||'';
  document.getElementById('btn-del').style.display=rec.en?'block':'none';
  const todayKey=dkey(today.getFullYear(),today.getMonth(),today.getDate());
  const btn=document.getElementById('btn-calc');
  btn.style.display=(selectedDate===todayKey)?'inline-flex':'none';
}

function calcFromNow(){
  const now = new Date();
  const base       = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 10, 0);
  const breakStart = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 19, 10, 0);
  const breakEnd   = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 19, 20, 0);
  if(now <= base){ alert('まだ17:10になっていません'); return; }
  let diffMin;
  if(now >= breakEnd){
    diffMin = (now - base) / 60000 - 10;
  } else if(now > breakStart){
    diffMin = (breakStart - base) / 60000;
  } else {
    diffMin = (now - base) / 60000;
  }
  const diffH = r(Math.floor(diffMin / 15) * 15 / 60);
  const nowStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('en-hours').value = diffH;
  document.getElementById('en-note').value = document.getElementById('en-note').value || `17:10〜${nowStr}`;
}

function saveEntry(){
  if(!selectedDate)return;
  const en=parseFloat(document.getElementById('en-hours').value)||0;
  const note=document.getElementById('en-note').value.trim();
  if(en<0){alert('0以上の値を入力してください');return;}
  records[selectedDate]={en:r(en),note};
  saveToGAS();
  renderAll();
}

function deleteEntry(){
  if(!selectedDate)return;
  delete records[selectedDate];
  saveToGAS();
  renderAll();
}

function renderLog(){
  const list=document.getElementById('log-list');
  const last=new Date(viewYear,viewMonth+1,0).getDate();
  let items=[];
  for(let d=1;d<=last;d++){
    const k=dkey(viewYear,viewMonth,d);
    const rec=records[k];
    if(rec&&rec.en>0)items.push({k,d,rec});
  }
  if(items.length===0){list.innerHTML=`<div style="font-size:13px;color:var(--text3);padding:8px 0;">まだ記録がありません</div>`;return;}
  list.innerHTML=`<div class="log-head"><span>日付</span><span>応援時間</span><span>メモ</span></div>`+
    items.map(({k,d,rec})=>`
    <div class="log-item" onclick="selectDay('${k}')">
      <span class="log-date">${d}日</span>
      <span class="log-en">${rec.en}h</span>
      <span class="log-note">${rec.note||'—'}</span>
    </div>`).join('');
}

function renderStats(){
  const ot = monthOt[mkey(viewYear,viewMonth)] || 0;
  const en = calcEnTotal(viewYear,viewMonth);
  const diff = r(ot-en);
  document.getElementById('stat-ot').innerHTML=`${ot}<span class="stat-unit">h</span>`;
  document.getElementById('stat-en').innerHTML=`${en}<span class="stat-unit">h</span>`;
  const dEl=document.getElementById('stat-diff');
  dEl.innerHTML=`${fmtDiff(diff)}<span class="stat-unit">h</span>`;
  dEl.className='stat-val '+diffClass(diff);
}

function renderBar(){
  const chart=document.getElementById('bar-chart');
  let months=[];
  for(let i=5;i>=0;i--){
    let my=viewYear,mm=viewMonth-i;
    if(mm<0){mm+=12;my--;}
    months.push({label:`${my}/${mm+1}`,ot:monthOt[mkey(my,mm)]||0});
  }
  const maxVal=Math.max(...months.map(m=>Math.abs(m.ot)),1);
  chart.innerHTML=months.map(m=>{
    const otW=Math.round(Math.abs(m.ot)/maxVal*100);
    return `<div class="bar-row">
      <span class="bar-label">${m.label}</span>
      <div class="bar-track"><div class="bar-ot" style="width:${otW}%"></div></div>
      <span class="bar-val" style="color:#ef9f27;">${m.ot}h</span>
    </div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  const otInput = document.getElementById('ot-month-input');
  otInput.addEventListener('wheel', (e) => {
    e.preventDefault();
    const current = parseFloat(otInput.value) || 0;
    const delta = e.deltaY < 0 ? 0.25 : -0.25;
    otInput.value = r(current + delta);
    onOtInput();
  }, { passive: false });

  const enInput = document.getElementById('en-hours');
  enInput.addEventListener('wheel', (e) => {
    e.preventDefault();
    const current = parseFloat(enInput.value) || 0;
    const delta = e.deltaY < 0 ? 0.25 : -0.25;
    const next = r(current + delta);
    if(next >= 0) enInput.value = next;
  }, { passive: false });
});

loadFromGAS();
</script>
</body>
</html>
